services:
  - type: web
    name: SuffaCampus-backend
    runtime: node
    region: singapore  # Closest to South Asia
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKERS
        value: "true"
      - key: NOTIFICATION_WORKER_MODE
        value: in-process
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_SECONDS
        value: "86400"
      - key: JWT_ISSUER
        value: suffacampus-api
      - key: JWT_AUDIENCE
        value: suffacampus-clients
      - key: AUTH_ALLOW_FIREBASE_FALLBACK
        value: "false"
      - key: FRONTEND_URL
        value: https://suffacampus.netlify.app
      - key: CORS_ORIGINS
        value: https://suffacampus.netlify.app
      - key: DATABASE_URL
        sync: false  # PostgreSQL connection string
      - key: FIREBASE_PROJECT_ID
        sync: false  # Set manually in Render dashboard
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        sync: false
      - key: METRICS_AUTH_TOKEN
        sync: false
      - key: SENTRY_DSN
        sync: false

