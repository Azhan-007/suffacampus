# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - suffacampus-api-azhan

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_APP_NAME: suffacampus-api-azhan
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Type check
        working-directory: apps/backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/backend
        run: npm run build

      - name: Run database migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Prune dev dependencies
        working-directory: apps/backend
        run: npm prune --production

      - name: Create deployment package
        run: |
          cd apps/backend
          zip -r ../../deploy.zip dist/ node_modules/ package.json prisma/ -x "node_modules/.cache/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_07D3AC00210540BBB8A9FA28984F1A16 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9A72B9C9608C452E8341406BEC8A7320 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C3BBA0D2BA83459E9B74252429BC7C24 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          slot-name: 'Production'
          package: deploy.zip

      # ── Post-deploy health check ──────────────────────────────────────
      # Waits up to 60s for the instance to become healthy after restart.
      # Catches deployment failures that would otherwise go unnoticed.
      - name: Verify deployment health
        run: |
          echo "Waiting 15s for app to restart..."
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.AZURE_APP_NAME }}.azurewebsites.net/health/live" || true)
            echo "Health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── Staging slot swap (activate when staging slot is created) ─────
      # To enable zero-downtime deploys:
      #   1. Create a staging slot in Azure Portal for this App Service
      #   2. Change slot-name above from 'Production' to 'staging'
      #   3. Uncomment the swap step below
      #
      # - name: Swap staging to production
      #   uses: azure/CLI@v1
      #   with:
      #     inlineScript: |
      #       az webapp deployment slot swap \
      #         --name ${{ env.AZURE_APP_NAME }} \
      #         --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
      #         --slot staging \
      #         --target-slot production