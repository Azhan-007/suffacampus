name: Web Panel CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/suffacampus-webpanel/**"
      - ".github/workflows/webpanel-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/suffacampus-webpanel/**"

defaults:
  run:
    working-directory: apps/suffacampus-webpanel

jobs:
  # ── Lint & Typecheck ─────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/suffacampus-webpanel/package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/suffacampus-webpanel/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests --verbose
        env:
          NODE_ENV: test

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/suffacampus-webpanel/package-lock.json

      - run: npm ci

      - name: Next.js build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://suffacampus-backend-new.onrender.com/api/v1
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-CI00000000

  # ── Deploy to Vercel (main only) ─────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Uncomment when Vercel project is connected:
      #
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: apps/suffacampus-webpanel

      - name: Placeholder — Vercel deployment not yet configured
        run: echo "✅ Build passed. Connect Vercel project to enable auto-deploy."
